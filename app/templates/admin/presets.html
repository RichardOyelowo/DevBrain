{% extends "layout.html" %}

{% block title %}: Admin Fast Starts{% endblock %}

{% block body %}
<section class="app-page">
    <div class="page-heading">
        <p class="eyebrow">Admin</p>
        <h1>Fast starts</h1>
        <p class="muted">Edit the preset cards shown at the top of quiz setup.</p>
    </div>

    <form method="post" class="panel form-grid">
        <label class="form-group">Title
            <input name="title" class="form-control" required>
        </label>
        <label class="form-group">Category
            <select name="topic_id" class="form-control" required>
                {% for topic in topics %}
                    <option value="{{ topic.id }}">{{ topic.name }}</option>
                {% endfor %}
            </select>
        </label>
        <label class="form-group full">Description
            <textarea name="description" class="form-control textarea"></textarea>
        </label>
        <label class="form-group">Difficulty
            <select name="difficulty" class="form-control">
                {% for difficulty in difficulties %}
                    <option value="{{ difficulty }}">{{ difficulty.title() }}</option>
                {% endfor %}
            </select>
        </label>
        <label class="form-group">Questions
            <input name="question_limit" class="form-control" type="number" min="1" max="25" value="5">
        </label>
        <label class="form-group">Language
            <select name="language" class="form-control">
                <option value="">Any language</option>
                {% for language in languages %}
                    <option value="{{ language.slug }}">{{ language.name }}</option>
                {% endfor %}
            </select>
        </label>
        <label class="form-group">Accent
            <select name="accent" class="form-control">
                {% for accent in accents %}
                    <option value="{{ accent }}">{{ accent.title() }}</option>
                {% endfor %}
            </select>
        </label>
        <label class="form-group">Position
            <input name="position" class="form-control" type="number" value="0">
        </label>
        <label class="form-group check-row">
            <input type="checkbox" name="is_active" value="1" checked>
            Active
        </label>
        <button class="button button-primary" type="submit">Add Fast Start</button>
    </form>

    <div class="admin-edit-list">
        {% for preset in presets %}
            <form method="post" class="panel form-grid compact-edit">
                <input type="hidden" name="preset_id" value="{{ preset.id }}">
                <label class="form-group">Title
                    <input name="title" class="form-control" value="{{ preset.title }}" required>
                </label>
                <label class="form-group">Slug
                    <input name="slug" class="form-control" value="{{ preset.slug }}">
                </label>
                <label class="form-group">Category
                    <select name="topic_id" class="form-control" required>
                        {% for topic in topics %}
                            <option value="{{ topic.id }}" {% if preset.topic_id == topic.id %}selected{% endif %}>{{ topic.name }}</option>
                        {% endfor %}
                    </select>
                </label>
                <label class="form-group full">Description
                    <textarea name="description" class="form-control textarea">{{ preset.description }}</textarea>
                </label>
                <label class="form-group">Difficulty
                    <select name="difficulty" class="form-control">
                        {% for difficulty in difficulties %}
                            <option value="{{ difficulty }}" {% if preset.difficulty == difficulty %}selected{% endif %}>{{ difficulty.title() }}</option>
                        {% endfor %}
                    </select>
                </label>
                <label class="form-group">Questions
                    <input name="question_limit" class="form-control" type="number" min="1" max="25" value="{{ preset.question_limit }}">
                </label>
                <label class="form-group">Language
                    <select name="language" class="form-control">
                        <option value="">Any language</option>
                        {% for language in languages %}
                            <option value="{{ language.slug }}" {% if preset.language == language.slug %}selected{% endif %}>{{ language.name }}</option>
                        {% endfor %}
                    </select>
                </label>
                <label class="form-group">Accent
                    <select name="accent" class="form-control">
                        {% for accent in accents %}
                            <option value="{{ accent }}" {% if preset.accent == accent %}selected{% endif %}>{{ accent.title() }}</option>
                        {% endfor %}
                    </select>
                </label>
                <label class="form-group">Position
                    <input name="position" class="form-control" type="number" value="{{ preset.position }}">
                </label>
                <label class="form-group check-row">
                    <input type="checkbox" name="is_active" value="1" {% if preset.is_active %}checked{% endif %}>
                    Active
                </label>
                <button class="button button-secondary" type="submit">Save</button>
            </form>
        {% endfor %}
    </div>
</section>
{% endblock %}
